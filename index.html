<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OS Lab IDE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: sans-serif;
    background: #0d1117;
    color: white;
}

.sidebar {
    width: 260px;
    background: #161b22;
    overflow-y: auto;
    padding: 10px;
}

.file {
    padding: 8px;
    cursor: pointer;
    border-radius: 5px;
}
.file:hover { background: #21262d; }

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#editor { height: 70%; }
#terminal {
    height: 30%;
    background: black;
    color: #00ff00;
    padding: 10px;
    overflow-y: auto;
    font-family: monospace;
}

.topbar {
    padding: 10px;
    background: #161b22;
    display: flex;
    justify-content: space-between;
}

button {
    background: #238636;
    border: none;
    padding: 6px 12px;
    color: white;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="sidebar" id="fileList">Loading...</div>

<div class="main">
    <div class="topbar">
        <span id="filename">No file</span>
        <button onclick="runCode()">▶ Run</button>
    </div>

    <div id="editor"></div>
    <div id="terminal">Terminal ready...</div>
</div>

<script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>

<script>
let editor;
let currentFile = "";

// Monaco setup
require.config({ paths: { vs: "https://unpkg.com/monaco-editor@latest/min/vs" }});
require(["vs/editor/editor.main"], function () {
    editor = monaco.editor.create(document.getElementById("editor"), {
        value: "// Loading...",
        language: "c",
        theme: "vs-dark"
    });
});

// 🔗 Fetch files from GitHub
async function loadFiles() {
    const res = await fetch("https://api.github.com/repos/codehubtvm/os-lab-programs/contents/Programs");
    const data = await res.json();

    let html = "";
    data.forEach(file => {
        html += `<div class="file" onclick="openFile('${file.download_url}','${file.name}')">${file.name}</div>`;
    });

    document.getElementById("fileList").innerHTML = html;
}

async function openFile(url, name) {
    currentFile = name;
    document.getElementById("filename").innerText = name;

    const res = await fetch(url);
    const code = await res.text();

    editor.setValue(code);
}

// ▶ Run code
async function runCode() {
    const code = editor.getValue();

    const res = await fetch("https://vigilant-engine-97wr9gj5v57hx4wr-5000.app.github.dev/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code })
    });

    const data = await res.json();
    document.getElementById("terminal").innerText = data.output;
}

loadFiles();
</script>

</body>
</html>
